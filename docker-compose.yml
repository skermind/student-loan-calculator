services:
  backend:
    build: ./backend
    container_name: loan-backend
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: loan-frontend
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro